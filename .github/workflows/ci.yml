name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ──────────────────────────────────────────────────────────────────────────────
# Pipeline DAG (rendered as arrows in the Actions graph view):
#
#                       ┌─► 🦀 Contract Tests ─┐
#   🔍 Lint & Format ──┼─► ⚛️  Frontend Tests ─┼─► 📦 Build ─► 🚀 Deploy ─┐
#                       └─► 🛡️  Security Audit ─────────────────────────────┴─► ✅ Summary
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  # ─── Stage 1 · Quality gate ──────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Rust formatting (cargo fmt)
        run: cargo fmt --all --check
      - name: Rust lint (clippy -D warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Type-check (tsc)
        run: npm run type-check --workspace=frontend
      - name: Lint frontend (eslint)
        run: npm run lint --workspace=frontend

  # ─── Stage 2 · Tests (parallel) ──────────────────────────────────────────────
  test-contracts:
    name: 🦀 Contract Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run contract tests
        run: cargo test --all

  test-frontend:
    name: ⚛️ Frontend Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run Vitest suite
        run: npm run test --workspace=frontend

  # ─── Stage 2 · Security (advisory, parallel branch) ──────────────────────────
  security:
    name: 🛡️ Security Audit
    needs: lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust security audit (advisory)
        run: |
          cargo install cargo-audit --locked || true
          cargo audit || true
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: npm audit (advisory)
        run: npm audit --audit-level=high || true

  # ─── Stage 3 · Build & artifacts ─────────────────────────────────────────────
  build:
    name: 📦 Build & Artifacts
    needs: [test-contracts, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build release WASMs
        run: cargo build --release --target wasm32-unknown-unknown --all
      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasms
          path: target/wasm32-unknown-unknown/release/*.wasm
          if-no-files-found: warn
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build --workspace=frontend
      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: frontend/.next
          if-no-files-found: warn

  # ─── Stage 4 · Deploy (main only) ────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy (Vercel)
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://polaris-eight-omega.vercel.app
    steps:
      - uses: actions/checkout@v4
      - name: Deploy frontend to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "ℹ️  No VERCEL_TOKEN secret set — production CD is handled by the"
            echo "    Vercel Git integration connected to this repository."
            echo "    Live: https://polaris-eight-omega.vercel.app"
            exit 0
          fi
          npm i -g vercel
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          vercel build --prod --token "$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"

  # ─── Stage 5 · Pipeline summary (always) ─────────────────────────────────────
  summary:
    name: ✅ Pipeline Summary
    needs: [lint, test-contracts, test-frontend, security, build, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Render pipeline diagram & results
        run: |
          {
            echo "# 🛰️ Polaris CI/CD Pipeline"
            echo ""
            echo '```mermaid'
            echo 'graph LR'
            echo '  A([🔍 Lint + Format]) --> B([🦀 Contract Tests])'
            echo '  A --> C([⚛️ Frontend Tests])'
            echo '  A --> S([🛡️ Security Audit])'
            echo '  B --> D([📦 Build + Artifacts])'
            echo '  C --> D'
            echo '  D --> E([🚀 Deploy Vercel])'
            echo '  E --> F([✅ Summary])'
            echo '  S --> F'
            echo '```'
            echo ""
            echo "| Stage | Result |"
            echo "| :-- | :-- |"
            echo "| 🔍 Lint & Format | ${{ needs.lint.result }} |"
            echo "| 🦀 Contract Tests | ${{ needs.test-contracts.result }} |"
            echo "| ⚛️ Frontend Tests | ${{ needs.test-frontend.result }} |"
            echo "| 🛡️ Security Audit | ${{ needs.security.result }} (advisory) |"
            echo "| 📦 Build & Artifacts | ${{ needs.build.result }} |"
            echo "| 🚀 Deploy (Vercel) | ${{ needs.deploy.result }} |"
            echo ""
            echo "**Live:** https://polaris-eight-omega.vercel.app"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Gate (fail if a required stage failed)
        if: >-
          needs.lint.result != 'success' ||
          needs.test-contracts.result != 'success' ||
          needs.test-frontend.result != 'success' ||
          needs.build.result != 'success' ||
          (needs.deploy.result != 'success' && needs.deploy.result != 'skipped')
        run: |
          echo "::error::One or more required pipeline stages failed."
          exit 1

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Rust / Smart Contracts ──────────────────────────────────────────────────
  contracts:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy lint (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run contract tests
        run: cargo test --all

      - name: Build release WASMs
        run: cargo build --release --target wasm32-unknown-unknown --all

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasms
          path: target/wasm32-unknown-unknown/release/*.wasm
          if-no-files-found: warn

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check --workspace=apps/web

      - name: Lint
        run: npm run lint --workspace=apps/web

      - name: Unit & component tests
        run: npm run test --workspace=apps/web

      - name: Build
        run: npm run build --workspace=apps/web

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/.next
          if-no-files-found: warn

  # ─── Security Scan (informational) ───────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    # Advisory only — surfaced in the run summary but does not block merges.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Rust security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high || true

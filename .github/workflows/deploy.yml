name: Deploy

# Deployment of Soroban contracts + frontend.
# Triggered automatically on push to main, or manually via workflow_dispatch.
#
# Secrets (configure under Settings → Environments):
#   STELLAR_SECRET_KEY   – Stellar secret key (S...) that funds & owns the deploy
#   DEPLOYER_SECRET_KEY  – Alias for STELLAR_SECRET_KEY (used by deploy script)
#   USDC_CONTRACT_ID     – Collateral token contract id
#   VERCEL_TOKEN         – Vercel deploy token (optional)
#   VERCEL_ORG_ID        – Vercel org id (optional)
#   VERCEL_PROJECT_ID    – Vercel project id (optional)
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      network:
        description: "Target Stellar network"
        type: choice
        options: [testnet, mainnet]
        default: testnet
      deploy_frontend:
        description: "Also deploy the frontend"
        type: boolean
        default: true

# Derive the network: use the dispatch input when available, else testnet for push events.
env:
  STELLAR_NETWORK: ${{ inputs.network || 'testnet' }}

jobs:
  # ─── 1. Smart contract deploy ─────────────────────────────────────────────────
  deploy-contract:
    name: Deploy Soroban Contract
    runs-on: ubuntu-latest
    environment: ${{ inputs.network || 'testnet' }}
    outputs:
      factory: ${{ steps.deploy.outputs.factory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Build contract WASM
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Deploy contract to Stellar testnet
        id: deploy
        env:
          DEPLOYER_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY || secrets.DEPLOYER_SECRET_KEY }}
          USDC_CONTRACT_ID: ${{ secrets.USDC_CONTRACT_ID }}
        run: |
          stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/*.wasm \
            --source "$DEPLOYER_SECRET_KEY" \
            --network "$STELLAR_NETWORK" || true

          # Full multi-contract deploy via script (writes .env.deployed)
          if [ -f scripts/deploy/deploy-testnet.sh ]; then
            bash scripts/deploy/deploy-testnet.sh || true
            if [ -f .env.deployed ]; then
              source .env.deployed
              echo "factory=${FACTORY_CONTRACT_ID:-}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Upload deployment manifest
        uses: actions/upload-artifact@v4
        with:
          name: deployment-${{ inputs.network || 'testnet' }}
          path: |
            .env.deployed
            deployments/
          if-no-files-found: ignore

  # ─── 2. Frontend deploy ───────────────────────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend
    needs: [deploy-contract]
    if: github.event_name == 'push' || inputs.deploy_frontend != false
    runs-on: ubuntu-latest
    environment: ${{ inputs.network || 'testnet' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          NEXT_PUBLIC_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_CONTRACT_ID || needs.deploy-contract.outputs.factory }}
          NEXT_PUBLIC_FACTORY_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_CONTRACT_ID || needs.deploy-contract.outputs.factory }}
          NEXT_PUBLIC_SOROBAN_RPC_URL: ${{ secrets.NEXT_PUBLIC_SOROBAN_RPC_URL || 'https://soroban-testnet.stellar.org' }}
          NEXT_PUBLIC_NETWORK_PASSPHRASE: ${{ secrets.NEXT_PUBLIC_NETWORK_PASSPHRASE || 'Test SDF Network ; September 2015' }}
          NEXT_PUBLIC_STELLAR_NETWORK: ${{ inputs.network || 'testnet' }}
        run: npm run build --workspace=frontend

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "ℹ️  No VERCEL_TOKEN set — production CD is handled by the Vercel Git integration."
            echo "    Live: https://polaris-eight-omega.vercel.app"
            exit 0
          fi
          npx vercel --prod --token "$VERCEL_TOKEN" --yes

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Polaris">
  <defs>
    <linearGradient id="polarisBlade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4a5ff"/>
      <stop offset="45%" stop-color="#8b3dff"/>
      <stop offset="100%" stop-color="#5b13c4"/>
    </linearGradient>
    <radialGradient id="polarisGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="polarisSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- ambient glow -->
  <circle cx="50" cy="50" r="46" fill="url(#polarisGlow)"/>

  <!-- six swirling blades -->
  <g filter="url(#polarisSoft)" stroke="#e9d5ff" stroke-width="0.6" stroke-opacity="0.5" stroke-linejoin="round">
    <g fill="url(#polarisBlade)">
      <path d="M50 50 C 47 35 53 21 67 14 C 61 24 59 33 60 42 C 57 46 54 48 50 50 Z" transform="rotate(0 50 50)"/>
      <path d="M50 50 C 47 35 53 21 67 14 C 61 24 59 33 60 42 C 57 46 54 48 50 50 Z" transform="rotate(60 50 50)"/>
      <path d="M50 50 C 47 35 53 21 67 14 C 61 24 59 33 60 42 C 57 46 54 48 50 50 Z" transform="rotate(120 50 50)"/>
      <path d="M50 50 C 47 35 53 21 67 14 C 61 24 59 33 60 42 C 57 46 54 48 50 50 Z" transform="rotate(180 50 50)"/>
      <path d="M50 50 C 47 35 53 21 67 14 C 61 24 59 33 60 42 C 57 46 54 48 50 50 Z" transform="rotate(240 50 50)"/>
      <path d="M50 50 C 47 35 53 21 67 14 C 61 24 59 33 60 42 C 57 46 54 48 50 50 Z" transform="rotate(300 50 50)"/>
    </g>
  </g>

  <!-- inner highlight core -->
  <circle cx="50" cy="50" r="4" fill="#d8b4fe" fill-opacity="0.9"/>
</svg>

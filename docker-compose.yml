# Local Postgres alternative to Neon for fully-offline development.
#
#   docker compose up -d db
#   # then in .env point BOTH urls at the local instance:
#   #   DATABASE_URL="postgresql://stellarpm:stellarpm@localhost:5432/stellarpm"
#   #   DIRECT_URL="postgresql://stellarpm:stellarpm@localhost:5432/stellarpm"
#   npm run db:migrate:deploy && npm run db:seed
#
# Adminer (optional DB UI) is exposed on http://localhost:8080.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: stellarpm
      POSTGRES_PASSWORD: stellarpm
      POSTGRES_DB: stellarpm
    ports:
      - "5432:5432"
    volumes:
      - stellarpm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stellarpm"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  stellarpm_pgdata:
